const MODELS = Object.keys(DATA);
let curModel = MODELS[0], curLayer = null;

// Two scenes — left (baseline, blue) and right (SDE, red)
function createScene(container) {
  const w = container.clientWidth, h = container.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x060610);
  scene.fog = new THREE.FogExp2(0x060610, 0.04);

  const camera = new THREE.PerspectiveCamera(55, w/h, 0.01, 100);
  camera.position.set(2.2, 1.5, 2.2);

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.8;
  controls.minDistance = 0.5;
  controls.maxDistance = 8;

  scene.add(new THREE.AmbientLight(0x223344, 0.3));
  const grid = new THREE.GridHelper(4, 20, 0x0a0a1a, 0x0a0a1a);
  grid.position.y = -1.5; scene.add(grid);

  return { scene, camera, renderer, controls, container };
}

const leftCtx = createScene(document.getElementById('sceneLeft'));
const rightCtx = createScene(document.getElementById('sceneRight'));

// Sync camera
leftCtx.controls.addEventListener('change', () => {
  rightCtx.camera.position.copy(leftCtx.camera.position);
  rightCtx.camera.quaternion.copy(leftCtx.camera.quaternion);
  rightCtx.controls.target.copy(leftCtx.controls.target);
});

let leftCloud = null, rightCloud = null;

function expandPoints(raw, baseColor, n=2000) {
  if (!raw || raw.length === 0) return { positions: new Float32Array(0), colors: new Float32Array(0), sizes: new Float32Array(0) };

  const xs = raw.map(p=>p.x), ys = raw.map(p=>p.y), zs = raw.map(p=>p.z);
  const mx = Math.max(...xs.map(Math.abs), ...ys.map(Math.abs), ...zs.map(Math.abs), 0.001);
  const scale = 1.5 / mx;

  const pos = new Float32Array(n*3);
  const col = new Float32Array(n*3);
  const siz = new Float32Array(n);
  const bc = new THREE.Color(baseColor);

  for (let i = 0; i < n; i++) {
    const src = raw[i % raw.length];
    const jitter = i < raw.length ? 0.01 : 0.15 + Math.random() * 0.25;
    
    let x, y, z;
    if (i < raw.length) {
      x = src.x * scale;
      y = src.y * scale;
      z = src.z * scale;
    } else {
      const a = raw[Math.floor(Math.random() * raw.length)];
      const b = raw[Math.floor(Math.random() * raw.length)];
      const t = Math.random();
      x = (a.x * t + b.x * (1-t)) * scale + (Math.random()-0.5) * jitter;
      y = (a.y * t + b.y * (1-t)) * scale + (Math.random()-0.5) * jitter;
      z = (a.z * t + b.z * (1-t)) * scale + (Math.random()-0.5) * jitter;
    }

    pos[i*3] = x;
    pos[i*3+1] = y;
    pos[i*3+2] = z;

    const variation = 0.7 + Math.random() * 0.3;
    const hue = (Math.random() - 0.5) * 0.08;
    const c = bc.clone();
    c.offsetHSL(hue, 0, (Math.random()-0.5)*0.15);
    col[i*3] = c.r * variation;
    col[i*3+1] = c.g * variation;
    col[i*3+2] = c.b * variation;

    siz[i] = i < raw.length ? 4.0 : 1.5 + Math.random() * 2.5;
  }
  return { positions: pos, colors: col, sizes: siz };
}

function buildCloud(ctx, data, baseColor) {
  const { positions, colors, sizes } = data;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;
      void main() {
        vColor = color;
        vAlpha = 1.0;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mv.z);
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float glow = exp(-d * 3.0);
        gl_FragColor = vec4(vColor * 0.7, vAlpha * glow * 0.35);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  return new THREE.Points(geo, mat);
}

function updateView() {
  const mdata = DATA[curModel];
  const ldata = mdata.data[curLayer];
  if (!ldata) return;

  // Remove old clouds
  if (leftCloud) { leftCtx.scene.remove(leftCloud); leftCloud.geometry.dispose(); }
  if (rightCloud) { rightCtx.scene.remove(rightCloud); rightCloud.geometry.dispose(); }

  const leftData = expandPoints(ldata.baseline_points, 0x4db3ff, 2000);
  const rightData = expandPoints(ldata.sde_points, 0xff4d4d, 2000);

  leftCloud = buildCloud(leftCtx, leftData, 0x4db3ff);
  rightCloud = buildCloud(rightCtx, rightData, 0xff4d4d);

  leftCtx.scene.add(leftCloud);
  rightCtx.scene.add(rightCloud);

  // Update HUD
  const br = ldata.baseline_ratio;
  const sr = ldata.sde_ratio;
  const ch = ldata.change_pct;
  document.getElementById('sB').textContent = br > 100 ? `${br.toFixed(0)}:1` : `${br.toFixed(1)}:1`;
  document.getElementById('sS').textContent = sr > 100 ? `${sr.toFixed(0)}:1` : `${sr.toFixed(1)}:1`;
  const chEl = document.getElementById('sC');
  chEl.textContent = `${ch > 0 ? '+' : ''}${ch.toFixed(1)}%`;
  chEl.style.color = ch < -10 ? '#40d080' : ch > 10 ? '#ff4d4d' : '#667';

  const tgts = mdata.sde_targets.map(t => `L${t}`).join(', ');
  document.getElementById('sT').textContent = `${tgts} mlp @ ${mdata.sde_scale}`;

  const ins = document.getElementById('insightText');
  if (Math.abs(ch) > 50) {
    ins.innerHTML = `<strong>Layer ${curLayer}</strong> — Massive dark space dissolution. Baseline compressed to ${br > 100 ? br.toFixed(0) : br.toFixed(1)}:1, SDE released to ${sr.toFixed(1)}:1. The representation expanded from a laser beam into a nebula cloud.`;
  } else if (Math.abs(ch) > 20) {
    ins.innerHTML = `<strong>Layer ${curLayer}</strong> — Significant manifold redistribution (${ch.toFixed(1)}%). Dark space partially activated — representations occupy more volume.`;
  } else if (Math.abs(ch) < 5) {
    ins.innerHTML = `<strong>Layer ${curLayer}</strong> — Control layer (${ch.toFixed(1)}%). Outside SDE intervention zone — natural baseline preserved.`;
  } else {
    ins.innerHTML = `<strong>Layer ${curLayer}</strong> — Moderate shift (${ch.toFixed(1)}%). SDE effect propagating through residual stream.`;
  }
}

function selectModel(m) {
  curModel = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.toggle('active', b.dataset.m === m));

  const mdata = DATA[m];
  const lc = document.getElementById('layerBtns');
  lc.innerHTML = '';
  mdata.layers.forEach(l => {
    const b = document.createElement('button');
    b.className = 'lbtn';
    b.textContent = `L${l}`;
    b.dataset.l = l;
    if (Math.abs(mdata.data[l].change_pct) > 20) b.classList.add('peak');
    b.onclick = () => selectLayer(l);
    lc.appendChild(b);
  });

  const peak = mdata.layers.reduce((best, l) =>
    Math.abs(mdata.data[l].change_pct) > Math.abs(mdata.data[best].change_pct) ? l : best,
    mdata.layers[0]
  );
  selectLayer(peak);
}

function selectLayer(l) {
  curLayer = l;
  document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.dataset.l === l));
  updateView();
}

// Init model buttons
const mc = document.getElementById('modelBtns');
MODELS.forEach(m => {
  const b = document.createElement('button');
  b.className = 'btn';
  b.textContent = DATA[m].display_name;
  b.dataset.m = m;
  b.onclick = () => selectModel(m);
  mc.appendChild(b);
});
selectModel(MODELS[0]);

// Animation loop
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  leftCtx.controls.update();
  // Sync right camera to left
  rightCtx.camera.position.copy(leftCtx.camera.position);
  rightCtx.camera.quaternion.copy(leftCtx.camera.quaternion);
  rightCtx.controls.target.copy(leftCtx.controls.target);

  if (leftCloud) leftCloud.material.uniforms.uTime.value = time;
  if (rightCloud) rightCloud.material.uniforms.uTime.value = time;

  leftCtx.renderer.render(leftCtx.scene, leftCtx.camera);
  rightCtx.renderer.render(rightCtx.scene, rightCtx.camera);
}
animate();

// Resize handler
window.addEventListener('resize', () => {
  [leftCtx, rightCtx].forEach(ctx => {
    const w = ctx.container.clientWidth, h = ctx.container.clientHeight;
    ctx.camera.aspect = w / h;
    ctx.camera.updateProjectionMatrix();
    ctx.renderer.setSize(w, h);
  });
});
</script>
